name: Build & Release

on:
  push:
    branches: [ "master" ]

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Download & Setup Dalamud
        run: |
          Invoke-WebRequest -Uri https://goatcorp.github.io/dalamud-distrib/latest.zip -OutFile dalamud.zip
          Expand-Archive -Force dalamud.zip "$env:AppData\XIVLauncher\addon\Hooks\dev\"

      - name: Build Poser
        run: dotnet build -c Release
      
      # We removed the Compress-Archive step and replaced it with a simple Move/Rename
      - name: Prepare Release Asset
        run: Move-Item -Path "bin/Release/Poser/latest.zip" -Destination "Poser.zip" -Force

      - name: Publish Rolling Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete latest --cleanup-tag -y || $true
          gh release create latest "Poser.zip" --title "Latest Release" --notes "Automated continuous build."